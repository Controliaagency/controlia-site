<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Controlia — Admin</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
:root{
  --bg:#0a0a0a;--card:#141414;--sidebar:#0f0f0f;
  --border:#252525;--border2:#2e2e2e;
  --text:#e2e8f0;--muted:#64748b;--faint:#94a3b8;
  --accent:#3b82f6;--accent-h:#2563eb;--accent-bg:rgba(59,130,246,.12);
  --emerald:#10b981;--amber:#f59e0b;--rose:#e11d48;--violet:#8b5cf6;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow-x:hidden}
body{font-family:'Inter',ui-sans-serif,system-ui,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;font-size:14px}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select,textarea{font-family:inherit;font-size:14px;color:var(--text)}
.hidden{display:none!important}

/* ── Layout ── */
.app{display:flex;min-height:100vh}
.sidebar{width:232px;flex-shrink:0;background:var(--sidebar);border-right:1px solid var(--border);position:sticky;top:0;height:100vh;display:flex;flex-direction:column}
.brand{padding:20px 18px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.brand-logo{width:36px;height:36px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(59,130,246,.3);flex-shrink:0;overflow:hidden}
.brand-logo img{width:28px;height:28px;object-fit:contain}
.brand-name{color:#fff;font-weight:700;font-size:16px;line-height:1.1}
.brand-sub{font-size:11px;color:var(--muted)}
.nav{flex:1;padding:10px;display:flex;flex-direction:column;gap:2px}
.nav-item{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:9px;color:var(--faint);font-weight:500;font-size:14px;transition:.12s;width:100%;text-align:left}
.nav-item:hover{background:#1a1a1a;color:var(--text)}
.nav-item.active{background:var(--accent-bg);color:#93c5fd;border:1px solid rgba(59,130,246,.25)}
.nav-item .lbl{flex:1}
.nav-badge{font-size:11px;font-weight:600;padding:1px 7px;border-radius:99px;background:#1e1e1e;color:var(--faint)}
.nav-item.active .nav-badge{background:rgba(59,130,246,.25);color:#93c5fd}
.nav-badge.alert{background:rgba(225,29,72,.2);color:#fb7185}
.sidebar-foot{padding:12px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:6px}
.btn-new{width:100%;display:flex;align-items:center;justify-content:center;gap:8px;background:var(--accent);color:#fff;font-weight:600;font-size:14px;padding:10px;border-radius:9px;transition:.12s}
.btn-new:hover{background:var(--accent-h)}
.btn-logout{width:100%;display:flex;align-items:center;justify-content:center;gap:7px;color:var(--muted);font-size:13px;padding:7px;border-radius:8px;transition:.12s}
.btn-logout:hover{background:#1a1a1a;color:var(--text)}
.main{flex:1;min-width:0;overflow-x:hidden}
.topbar{position:sticky;top:0;z-index:20;background:rgba(10,10,10,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:13px 28px;display:flex;align-items:center;gap:12px}
.topbar h1{font-size:18px;font-weight:700;color:#fff;flex:1}
.icon-btn{position:relative;padding:8px;border-radius:8px;color:var(--muted);transition:.12s}
.icon-btn:hover{background:#1a1a1a;color:var(--text)}
.bell-badge{position:absolute;top:-1px;right:-1px;background:var(--rose);color:#fff;font-size:10px;font-weight:700;min-width:17px;height:17px;padding:0 3px;border-radius:99px;display:flex;align-items:center;justify-content:center}
.btn-primary{display:flex;align-items:center;gap:7px;background:var(--accent);color:#fff;font-weight:600;font-size:14px;padding:8px 16px;border-radius:9px;transition:.12s}
.btn-primary:hover{background:var(--accent-h)}
.content{padding:24px 28px}
.stack{display:flex;flex-direction:column;gap:20px}

/* ── Cards & Grid ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:14px}
.grid{display:grid;gap:14px}
.kpi{padding:18px 20px;display:flex;flex-direction:column;justify-content:space-between;min-height:108px}
.kpi-ic{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center}
.kpi-val{font-size:26px;font-weight:800;color:#fff;line-height:1;margin-top:10px}
.kpi-lbl{font-size:12px;color:var(--muted);font-weight:500;margin-top:3px}
.tint-blue{color:#93c5fd;background:rgba(59,130,246,.15)}
.tint-violet{color:#c4b5fd;background:rgba(139,92,246,.15)}
.tint-emerald{color:#6ee7b7;background:rgba(16,185,129,.15)}
.tint-amber{color:#fcd34d;background:rgba(245,158,11,.15)}
.vtile{border-radius:14px;padding:18px 20px;border:1px solid var(--border)}
.vtile .t{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:500;opacity:.7;margin-bottom:8px}
.vtile .v{font-size:24px;font-weight:800;color:#fff}
.g-emerald{background:linear-gradient(135deg,rgba(16,185,129,.18),rgba(5,150,105,.12));border-color:rgba(16,185,129,.25)}
.g-indigo{background:linear-gradient(135deg,rgba(59,130,246,.18),rgba(37,99,235,.12));border-color:rgba(59,130,246,.3)}
.g-slate{background:linear-gradient(135deg,rgba(51,65,85,.3),rgba(30,41,59,.2));border-color:rgba(51,65,85,.4)}

/* ── Ring ── */
.ring-wrap{padding:18px 20px;display:flex;align-items:center;gap:18px}
.ring{position:relative;width:120px;height:120px;flex-shrink:0}
.ring svg{transform:rotate(-90deg);display:block}
.ring .center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring .rnum{font-size:26px;font-weight:800;color:#fff}
.ring .rnum.done{color:var(--emerald)}
.ring .rgoal{font-size:11px;color:var(--muted);font-weight:500}
.eyebrow{font-size:11px;font-weight:600;color:#93c5fd;text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}

/* ── Lists ── */
.list{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.row{display:flex;align-items:center;gap:11px;padding:11px 16px;border-bottom:1px solid var(--border);transition:background .1s}
.row:last-child{border-bottom:none}
.row:hover{background:#1a1a1a}
.avatar{width:34px;height:34px;border-radius:99px;background:#1e1e1e;border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-weight:600;color:var(--faint);flex-shrink:0;font-size:14px}
.row-main{flex:1;min-width:0;text-align:left}
.row-name{font-weight:600;color:var(--text);font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row-sub{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chip{font-size:11px;font-weight:600;padding:4px 10px;border-radius:99px;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;border:1px solid transparent}
.dot{width:6px;height:6px;border-radius:99px;display:inline-block;flex-shrink:0}
.mini-btn{padding:7px;border-radius:8px;color:var(--muted);transition:.12s}
.mini-btn:hover{background:#1e1e1e;color:var(--accent)}
.mini-btn.green:hover{color:var(--emerald)}

/* ── Toolbar / Search ── */
.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
.search{position:relative;flex:1;min-width:200px}
.search svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
.search input{width:100%;padding:9px 12px 9px 36px;border-radius:9px;border:1px solid var(--border2);background:#1a1a1a}
.search input::placeholder{color:#3a3a3a}
.search input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,130,246,.15)}
.chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px}
.fchip{padding:6px 12px;border-radius:9px;font-size:12px;font-weight:500;white-space:nowrap;background:#1a1a1a;border:1px solid var(--border2);color:var(--muted);transition:.12s}
.fchip:hover{border-color:var(--accent);color:var(--text)}
.fchip.on{background:var(--accent-bg);color:#93c5fd;border-color:rgba(59,130,246,.4)}

/* ── Kanban ── */
.kanban{display:flex;gap:10px;overflow-x:auto;padding-bottom:12px}
.kcol{width:248px;flex-shrink:0;border-radius:12px;background:#111;border:1px solid var(--border);padding:10px;transition:.12s}
.kcol.over{border-color:var(--accent);background:rgba(59,130,246,.06)}
.kcol-head{display:flex;align-items:center;justify-content:space-between;padding:0 4px 8px}
.kcol-head .l{display:flex;align-items:center;gap:7px;font-weight:600;font-size:13px;color:var(--text)}
.kcol-count{font-size:12px;color:var(--muted)}
.kcol-val{font-size:11px;font-weight:600;color:var(--muted)}
.kcol-body{display:flex;flex-direction:column;gap:7px;min-height:48px}
.kcard{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:11px;cursor:grab;transition:.12s}
.kcard:hover{border-color:rgba(59,130,246,.4);box-shadow:0 4px 14px rgba(0,0,0,.4)}
.kcard.dragging{opacity:.35}
.kcard .kn{font-weight:600;font-size:13px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.kcard .ke{font-size:12px;color:var(--muted);margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.kcard .kf{display:flex;align-items:center;justify-content:space-between}
.kval{font-size:12px;font-weight:600;color:var(--emerald)}
.krel{font-size:10px;display:flex;align-items:center;gap:3px;color:var(--muted)}
.krel.late{color:var(--rose)}
.kcol-empty{text-align:center;font-size:11px;color:#2a2a2a;padding:16px}

/* ── Forms ── */
.field{display:block}
.field>span{font-size:12px;font-weight:500;color:var(--muted);margin-bottom:5px;display:block}
.inp{width:100%;padding:9px 12px;border-radius:9px;border:1px solid var(--border2);background:#1a1a1a;color:var(--text)}
.inp::placeholder{color:#3a3a3a}
.inp:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,130,246,.15)}
textarea.inp{resize:vertical}
select.inp option{background:#1a1a1a}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.col-2{grid-column:span 2}
.sub-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.section-divider{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;padding-bottom:8px;border-bottom:1px solid var(--border);margin-bottom:12px}
.checkline{display:flex!important;flex-direction:row!important;align-items:center;gap:10px;background:rgba(59,130,246,.08);padding:11px 14px;border-radius:9px;border:1px solid rgba(59,130,246,.2);cursor:pointer}
.checkline span{margin:0!important;font-size:13px;color:#93c5fd;font-weight:500}
.checkline input[type=checkbox]{width:16px;height:16px;accent-color:var(--accent);cursor:pointer;flex-shrink:0}
.qact{display:flex;flex-wrap:wrap;gap:7px}
.qbtn{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:500;padding:6px 12px;border-radius:8px;transition:.12s}
.qbtn.call{background:rgba(59,130,246,.12);color:#93c5fd}
.qbtn.call:hover{background:rgba(59,130,246,.2)}
.qbtn.win{background:rgba(16,185,129,.1);color:#6ee7b7}
.qbtn.win:hover{background:rgba(16,185,129,.18)}
.qbtn.lose{background:rgba(225,29,72,.1);color:#fda4af}
.qbtn.lose:hover{background:rgba(225,29,72,.18)}

/* ── Progress ── */
.pbar{height:8px;border-radius:99px;background:#1e1e1e;overflow:hidden}
.pbar>span{display:block;height:100%;border-radius:99px;transition:width .5s}
.frow{display:flex;align-items:center;gap:11px}
.fbar{flex:1;height:26px;background:#1e1e1e;border-radius:8px;overflow:hidden}
.fbar>span{display:flex;align-items:center;height:100%;border-radius:8px;color:#fff;font-size:12px;font-weight:600;padding:0 8px;transition:width .5s;min-width:0}

/* ── Empty ── */
.empty{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:56px 24px;text-align:center}
.empty .ei{width:52px;height:52px;border-radius:14px;background:#1a1a1a;color:var(--muted);display:flex;align-items:center;justify-content:center;margin:0 auto 14px}
.empty h3{font-weight:700;color:var(--text);font-size:17px}
.empty p{font-size:14px;color:var(--muted);margin-top:4px;max-width:340px;margin-left:auto;margin-right:auto}

/* ── Modal ── */
.overlay{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--card);width:100%;max-width:520px;border-radius:16px;border:1px solid var(--border);box-shadow:0 24px 64px rgba(0,0,0,.6);max-height:90vh;overflow-y:auto}
.modal-head{position:sticky;top:0;background:var(--card);border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;z-index:2}
.modal-head h2{font-weight:700;color:#fff;font-size:16px}
.modal-body{padding:20px;display:flex;flex-direction:column;gap:14px}
.modal-foot{position:sticky;bottom:0;background:var(--card);border-top:1px solid var(--border);padding:13px 20px;display:flex;align-items:center;gap:8px}
.btn-ghost{padding:9px 16px;border-radius:8px;font-size:14px;font-weight:500;color:var(--muted);transition:.12s}
.btn-ghost:hover{background:#1e1e1e;color:var(--text)}
.btn-save{padding:9px 20px;border-radius:9px;font-size:14px;font-weight:600;background:var(--accent);color:#fff;transition:.12s}
.btn-save:hover{background:var(--accent-h)}
.btn-save:disabled{opacity:.4;cursor:not-allowed}
.btn-danger{padding:9px 16px;border-radius:9px;font-size:14px;font-weight:600;background:var(--rose);color:#fff;cursor:pointer;border:none;font-family:inherit}
.btn-del{padding:9px;border-radius:8px;color:var(--rose);opacity:.7;transition:.12s}
.btn-del:hover{background:rgba(225,29,72,.12);opacity:1}
.spacer{flex:1}
.hist{display:flex;flex-direction:column;gap:8px;max-height:150px;overflow-y:auto}
.hist-item{display:flex;gap:9px;font-size:13px}
.hist-dot{width:5px;height:5px;border-radius:99px;background:var(--border2);margin-top:6px;flex-shrink:0}
.hist-type{font-weight:500;color:var(--text)}
.hist-date{font-size:11px;color:var(--muted)}

/* ── Devis ── */
.devis-table{width:100%;border-collapse:collapse}
.devis-table th{text-align:left;font-size:11px;font-weight:600;color:var(--muted);padding:10px 14px;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.04em}
.devis-table td{padding:11px 14px;border-bottom:1px solid var(--border);vertical-align:middle;font-size:14px}
.devis-table tr:last-child td{border-bottom:none}
.devis-table tr:hover td{background:#1a1a1a}
.lines-table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.lines-table{width:100%;border-collapse:collapse;min-width:360px}
.lines-table th{font-size:11px;color:var(--muted);padding:6px 8px;border-bottom:1px solid var(--border);text-align:left}
.lines-table td{padding:4px 4px;vertical-align:middle}
.lines-table .inp{padding:6px 8px;font-size:13px}
.totals{margin-top:12px;border-top:1px solid var(--border);padding-top:12px}
.total-row{display:flex;justify-content:space-between;font-size:14px;padding:3px 0}
.total-ttc{font-weight:700;font-size:16px;color:#fff}

/* ── Agent ── */
.agent-block{background:linear-gradient(135deg,#141414 0%,#1a1a1a 100%);border:1px solid rgba(59,130,246,.22);border-radius:16px;padding:20px 24px;position:relative;overflow:hidden;box-shadow:0 0 48px rgba(59,130,246,.05)}
.agent-block::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(59,130,246,.55),transparent)}
.agent-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.agent-title{font-size:13px;font-weight:600;color:#93c5fd;display:flex;align-items:center;gap:7px}
.agent-time{font-size:12px;color:var(--muted)}
.agent-msg{font-size:15px;line-height:1.75;color:#f1f5f9;min-height:48px}
.agent-msg.loading{color:var(--muted);font-style:italic;font-size:14px;display:flex;align-items:center;gap:8px}
.agent-dot{display:inline-block;width:6px;height:6px;border-radius:99px;background:var(--accent);animation:pulse 1.2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}
.agent-refresh{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--muted);padding:5px 10px;border-radius:7px;transition:.12s;margin-top:10px}
.agent-refresh:hover{background:#1e1e1e;color:var(--text)}

/* ── Voice ── */
.voice-fab{position:fixed;bottom:80px;right:20px;z-index:40;width:52px;height:52px;border-radius:99px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(59,130,246,.4);transition:.15s;cursor:pointer;border:none}
.voice-fab:hover{background:var(--accent-h);transform:scale(1.05)}
.voice-fab.recording{background:var(--rose);animation:voicepulse 1s ease-in-out infinite;box-shadow:0 4px 20px rgba(225,29,72,.5)}
@keyframes voicepulse{0%,100%{box-shadow:0 4px 20px rgba(225,29,72,.3)}50%{box-shadow:0 4px 30px rgba(225,29,72,.7)}}
.voice-modal{position:fixed;inset:0;z-index:60;background:rgba(0,0,0,.8);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:24px}
.voice-panel{background:var(--card);border:1px solid var(--border);border-radius:20px;width:100%;max-width:480px;padding:28px;box-shadow:0 24px 64px rgba(0,0,0,.6)}
.voice-panel h3{font-size:17px;font-weight:700;color:#fff;margin-bottom:4px}
.voice-panel p{font-size:13px;color:var(--muted);margin-bottom:20px}
.voice-transcript{background:#1a1a1a;border:1px solid var(--border2);border-radius:10px;padding:14px;min-height:60px;font-size:14px;color:var(--text);line-height:1.6;margin-bottom:16px;font-style:italic}
.voice-result{background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.2);border-radius:10px;padding:14px;font-size:13px;color:#93c5fd;line-height:1.6;margin-bottom:16px}
.voice-actions{display:flex;gap:10px;justify-content:flex-end}

/* ── Devis preview ── */
.dv-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.88);backdrop-filter:blur(6px);display:flex;flex-direction:column;align-items:center;overflow-y:auto;padding:20px 16px}
.dv-bar{width:100%;max-width:860px;display:flex;justify-content:space-between;align-items:center;padding:10px 0;margin-bottom:14px;flex-shrink:0}
.dv-bar-title{font-size:14px;font-weight:600;color:#e2e8f0}
.dv-bar-btns{display:flex;gap:10px}
.dv-btn{padding:8px 16px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;transition:.12s}
.dv-btn-close{background:rgba(255,255,255,.1);color:#e2e8f0;border:1px solid rgba(255,255,255,.15)}
.dv-btn-close:hover{background:rgba(255,255,255,.18)}
.dv-btn-edit{background:rgba(255,255,255,.08);color:#e2e8f0;border:1px solid rgba(255,255,255,.12)}
.dv-btn-edit:hover{background:rgba(255,255,255,.15)}
.dv-btn-pdf{background:var(--accent);color:#fff;border:none;font-weight:600}
.dv-btn-pdf:hover{background:var(--accent-h)}
.dv-btn-pdf:disabled{opacity:.6;cursor:wait}
.dv-doc{width:100%;max-width:860px;background:#fff;border-radius:10px;box-shadow:0 24px 64px rgba(0,0,0,.6);overflow:hidden;margin-bottom:24px}

/* ── Toast ── */
.toast-el{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:100;padding:10px 16px;border-radius:9px;box-shadow:0 8px 32px rgba(0,0,0,.5);color:#fff;font-size:14px;font-weight:500;display:flex;align-items:center;gap:8px;background:#1e1e1e;border:1px solid var(--border2);animation:toastpop .18s ease;white-space:nowrap}
.toast-el.win{background:#064e3b;border-color:rgba(16,185,129,.3)}
.toast-el.warn{background:#78350f;border-color:rgba(245,158,11,.3)}
.toast-el.err{background:#4c0519;border-color:rgba(225,29,72,.3)}

let state={

  settings:{objAppels:30,objRdv:3,objVentes:1},

/* ════════════════════════════════════════════════════════════
   API
════════════════════════════════════════════════════════════ */
async function api(method,path,body){
  const token=localStorage.getItem('controlia_token');
  try{
    const res=await fetch('/.netlify/functions'+path,{
      method,
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+(token||'')},
      body:body?JSON.stringify(body):undefined,
    });
    if(res.status===401){logout();return null;}
    return await res.json();
  }catch(e){
    console.error('API',path,e);
    toast('Erreur réseau','err');
    return null;
  }
}
function logout(){localStorage.removeItem('controlia_token');window.location='/admin/login.html';}

/* ════════════════════════════════════════════════════════════
   DB MAPPERS
════════════════════════════════════════════════════════════ */
function fromDB(r){
  return{
    id:r.id,nom:r.nom||'',entreprise:r.entreprise||'',telephone:r.telephone||'',
    email:r.email||'',source:r.source||'Appel à froid',statut:r.statut||'Nouveau',
    valeur:Number(r.valeur)||0,notes:r.notes||'',
    ville:r.ville||'',secteur:r.secteur||'',
    dateRelance:r.date_relance||null,dateCreation:r.date_creation||new Date().toISOString(),
    historique:r.historique||[],
  };
}

    id:c.id,nom:c.nom,entreprise:c.entreprise,telephone:c.telephone,email:c.email,

/* ════════════════════════════════════════════════════════════
   KPI
════════════════════════════════════════════════════════════ */
function computeKPI(){
  const today=todayKey();
  let appelsJour=0,appelsTotal=0,rdvJour=0,ventesJour=0;
  const parJour={};
  for(let i=13;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);parJour[dayKey(d)]=0;}
  state.contacts.forEach(c=>{
    (c.historique||[]).forEach(h=>{
      if(h.type==='Appel'){appelsTotal++;const k=dayKey(h.date);if(k in parJour)parJour[k]++;if(k===today)appelsJour++;}
      if(h.type==='RDV'&&dayKey(h.date)===today)rdvJour++;
      if(h.type==='Gagné'&&dayKey(h.date)===today)ventesJour++;
    });
  });
  const rdvActifs=state.contacts.filter(c=>c.statut==='RDV').length;
  const gagnes=state.contacts.filter(c=>c.statut==='Gagné');
  const contactes=state.contacts.filter(c=>c.statut!=='Nouveau').length;
  const caGagne=gagnes.reduce((s,c)=>s+(c.valeur||0),0);
  const pipeline=state.contacts.filter(c=>!['Gagné','Perdu'].includes(c.statut)).reduce((s,c)=>s+(c.valeur||0),0);
  const conv=contactes>0?Math.round(gagnes.length/contactes*100):0;
  const chart=Object.entries(parJour).map(([d,v])=>({jour:fmtDay(d),appels:v}));
  return{appelsJour,appelsTotal,rdvJour,ventesJour,rdvActifs,gagnes:gagnes.length,contactes,caGagne,pipeline,conv,chart};
}
function computeRelances(){
  const g={retard:[],aujourdhui:[],avenir:[]};
  state.contacts.filter(c=>c.dateRelance&&!['Gagné','Perdu'].includes(c.statut))
    .forEach(c=>{const s=relanceState(c.dateRelance);if(g[s])g[s].push(c);});
  Object.values(g).forEach(a=>a.sort((a,b)=>new Date(a.dateRelance)-new Date(b.dateRelance)));
  return g;
}

function findC(id){return state.contacts.find(c=>c.id===id);}
function commitC(c){const i=state.contacts.findIndex(x=>x.id===c.id);if(i>=0)state.contacts[i]=c;else state.contacts.unshift(c);}
function g(id){const e=document.getElementById(id);return e?e.value:'';}

async function saveContactFromForm(){
  const nom=(g('f-nom')||'').trim();
  if(!nom)return;
  const logNow=document.getElementById('f-appel')&&document.getElementById('f-appel').checked;
  const isNew=!(state.editing&&state.editing.id);
  const draft={
    nom,entreprise:g('f-entreprise'),telephone:g('f-telephone'),email:g('f-email'),
    statut:g('f-statut')||'Nouveau',source:g('f-source')||'Appel à froid',
    valeur:Number(g('f-valeur'))||0,notes:g('f-notes'),
    ville:g('f-ville'),secteur:g('f-secteur'),
    dateRelance:g('f-relance')?new Date(g('f-relance')).toISOString():null,
  };
  if(!isNew){
    const updated={...state.editing,...draft};
    commitC(updated);
    state.editing=null;state.confirmDel=false;render();
    await api('PUT','/contacts?id='+updated.id,toDB(updated));
    toast('Contact mis à jour');
  }else{
    const hist=[{date:new Date().toISOString(),type:'Création',note:''}];
    if(logNow){
      const appelDateEl=document.getElementById('f-appel-date');
      const appelDate=appelDateEl&&appelDateEl.value?new Date(appelDateEl.value).toISOString():new Date().toISOString();
      hist.push({date:appelDate,type:'Appel',note:''});
      if(draft.statut==='Nouveau')draft.statut='Contacté';
    }
    const nc={id:uid(),historique:hist,dateCreation:new Date().toISOString(),...draft};
    state.contacts.unshift(nc);
    state.editing=null;state.confirmDel=false;render();
    await api('POST','/contacts',toDB(nc));
    toast(logNow?'Contact ajouté et appel enregistré 📞':'Contact ajouté');
  }
}
function syncFromForm(){
  const c=state.editing;if(!c||!document.getElementById('f-nom'))return;
  c.nom=(g('f-nom')||'').trim();c.entreprise=g('f-entreprise');
  c.telephone=g('f-telephone');c.email=g('f-email');
  c.statut=g('f-statut')||c.statut;c.source=g('f-source')||c.source;
  c.valeur=Number(g('f-valeur'))||0;c.notes=g('f-notes');
  c.ville=g('f-ville');c.secteur=g('f-secteur');
  const r=g('f-relance');if(r!==undefined)c.dateRelance=r?new Date(r).toISOString():null;
}

async function logCall(id,fromModal){
  if(fromModal)syncFromForm();
  const c=findC(id)||(fromModal?state.editing:null);if(!c)return;
  const updated={...c,historique:[...(c.historique||[]),{date:new Date().toISOString(),type:'Appel',note:''}],statut:c.statut==='Nouveau'?'Contacté':c.statut};
  commitC(updated);if(fromModal)state.editing=updated;render();
  await api('PUT','/contacts?id='+id,toDB(updated));
  toast('Appel enregistré 📞');
  scheduleAgent();
}
async function moveStage(id,statut,closeModal){
  if(closeModal&&state.editing)syncFromForm();
  const c=findC(id)||(closeModal?state.editing:null);if(!c)return;
  const updated={...c,statut,historique:[...(c.historique||[]),{date:new Date().toISOString(),type:statut,note:''}],dateRelance:['Gagné','Perdu'].includes(statut)?null:c.dateRelance};

async function closeRelance(id){

function nextNumero(){
  const y=new Date().getFullYear();
  const n=state.devis.filter(d=>d.numero&&d.numero.startsWith('DEV-'+y)).length+1;
  return 'DEV-'+y+'-'+String(n).padStart(3,'0');
}
function getDevisFormData(){
  const lignes=[];
  document.querySelectorAll('.dline').forEach(row=>{
    const desc=row.querySelector('[data-field=desc]');
    const qty=row.querySelector('[data-field=qty]');
    const pu=row.querySelector('[data-field=pu]');
    if(desc){const q=Number(qty&&qty.value)||1,p=Number(pu&&pu.value)||0;
      lignes.push({description:desc.value,quantite:q,prixUnitaire:p,total:Math.round(q*p*100)/100});}
  });
  const tvaSel=document.getElementById('d-tva');
  const tvaVal=tvaSel&&tvaSel.value!==''?Number(tvaSel.value):0;
  return{
    clientNom:g('d-clientNom'),clientEntreprise:g('d-clientEntreprise'),
    clientEmail:g('d-clientEmail'),clientTelephone:g('d-clientTelephone'),
    clientAdresse:g('d-clientAdresse'),
    tva:tvaVal,statut:g('d-statut')||'Brouillon',
    dateValidite:g('d-validite')||'',notes:g('d-notes')||'',lignes,
  };
}
async function saveDevisFromForm(){
  const data=getDevisFormData();
  const cur=state.editingDevis;
  const isNew=!cur.id;
  const nd={...cur,...data};
  if(isNew){nd.id=uid();nd.numero=nextNumero();nd.dateCreation=new Date().toISOString();}
  const idx=state.devis.findIndex(d=>d.id===nd.id);
  if(idx>=0)state.devis[idx]=nd;else state.devis.unshift(nd);
  state.editingDevis=null;state.confirmDelDevis=false;render();
  if(isNew)await api('POST','/devis',toDBDevis(nd));
  else await api('PUT','/devis?id='+nd.id,toDBDevis(nd));
  toast(isNew?'Devis créé':'Devis enregistré');
}
async function deleteDevis(id){
  state.devis=state.devis.filter(d=>d.id!==id);
  state.editingDevis=null;state.confirmDelDevis=false;render();
  await api('DELETE','/devis?id='+id);
  toast('Devis supprimé','warn');
}
function recomputeDevisLines(){
  let ht=0;
  document.querySelectorAll('.dline').forEach(row=>{
    const qty=Number((row.querySelector('[data-field=qty]')||{}).value)||1;
    const pu=Number((row.querySelector('[data-field=pu]')||{}).value)||0;
    const tot=Math.round(qty*pu*100)/100;
    const c4=row.querySelector('td:nth-child(4)');if(c4)c4.textContent=eur(tot);
    ht+=tot;
  });
  const tvaSel=document.getElementById('d-tva');
  const tvaPct=tvaSel&&tvaSel.value!==''?Number(tvaSel.value):0;
  const tvaAmt=Math.round(ht*tvaPct)/100;
  const ttc=ht+tvaAmt;
  const hEl=document.getElementById('tot-ht');if(hEl)hEl.textContent=eur(ht);
  const tEl=document.getElementById('tot-tva');if(tEl)tEl.textContent=eur(tvaAmt);
  const cEl=document.getElementById('tot-ttc');if(cEl)cEl.textContent=eur(ttc);
}

function previewDevis(d){
  const existing=document.getElementById('_dv_preview');
  if(existing)existing.remove();
  const docHTML=buildDevisHTML(d);
  const ov=document.createElement('div');
  ov.id='_dv_preview';
  ov.className='dv-overlay';
  const bar=document.createElement('div');
  bar.className='dv-bar';
  bar.innerHTML='<span class="dv-bar-title">'+esc(d.numero)+' — Aperçu</span>'
    +'<div class="dv-bar-btns">'
      +'<button class="dv-btn dv-btn-edit" id="_dv_edit">✏️ Modifier</button>'
      +'<button class="dv-btn dv-btn-close" id="_dv_close">✕ Fermer</button>'
      +'<button class="dv-btn dv-btn-pdf" id="_dv_pdf">⬇ Générer le PDF</button>'
    +'</div>';
  const doc=document.createElement('div');
  doc.id='_dv_doc';
  doc.className='dv-doc';
  doc.innerHTML=docHTML;
  ov.appendChild(bar);
  ov.appendChild(doc);
  document.body.appendChild(ov);
  document.getElementById('_dv_close').onclick=()=>ov.remove();
  document.getElementById('_dv_edit').onclick=()=>{
    ov.remove();
    state.editingDevis={...d,lignes:[...(d.lignes||[])]};
    state.confirmDelDevis=false;render();
  };
  ov.onclick=e=>{if(e.target===ov)ov.remove();};
  document.getElementById('_dv_pdf').onclick=function(){
    const btn=this;
    if(typeof html2pdf==='undefined'){toast('Chargement en cours, réessayez','err');return;}
    btn.disabled=true;btn.textContent='Génération…';
    html2pdf().set({
      margin:0,filename:'Devis-'+d.numero+'-Controlia.pdf',
      image:{type:'jpeg',quality:0.97},
      html2canvas:{scale:2,useCORS:true,logging:false,backgroundColor:'#ffffff'},
      jsPDF:{unit:'mm',format:'a4',orientation:'portrait'}
    }).from(document.getElementById('_dv_doc')).save()
      .then(()=>{btn.disabled=false;btn.textContent='⬇ Générer le PDF';toast('PDF téléchargé ✓','win');})
      .catch(e=>{btn.disabled=false;btn.textContent='⬇ Générer le PDF';toast('Erreur PDF : '+e.message,'err');});
  };
}

let agentTimer=null,agentDebounce=null;
async function fetchAgent(){
  if(!state.loaded)return;
  state.agent.loading=true;
  const el=document.getElementById('agent-block');
  if(el)el.innerHTML=agentBlockHTML();
  const k=computeKPI(),rel=computeRelances(),now=new Date();
  const res=await api('POST','/agent',{
    kpi:{...k,objAppels:state.settings.objAppels,objRdv:state.settings.objRdv,objVentes:state.settings.objVentes},
    relances:{retard:rel.retard,aujourdhui:rel.aujourdhui},
    contacts:state.contacts,
    heure:now.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}),
    jour:now.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'}),
  });
  state.agent.msg=res&&res.message?res.message:null;
  state.agent.time=now.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
  state.agent.loading=false;
  const el2=document.getElementById('agent-block');
  if(el2)el2.innerHTML=agentBlockHTML();
  clearTimeout(agentTimer);
  agentTimer=setTimeout(fetchAgent,5*60*1000);
}
function scheduleAgent(){
  clearTimeout(agentDebounce);
  agentDebounce=setTimeout(fetchAgent,1500);
}

let voiceRec=null,voiceModal=null;
function openVoiceModal(){
  if(voiceModal)voiceModal.remove();
  voiceModal=document.createElement('div');
  voiceModal.className='voice-modal';
  voiceModal.innerHTML='<div class="voice-panel">'
    +'<h3>'+ic('mic',18)+' Commande vocale</h3>'
    +'<p>Parlez naturellement : "J\'ai appelé Sophie Martin de la boulangerie, elle est intéressée par un site, je la rappelle jeudi."</p>'
    +'<div class="voice-transcript" id="v-transcript" style="color:#64748b;font-style:italic">En attente…</div>'
    +'<div class="voice-result" id="v-result" style="display:none"></div>'
    +'<div class="voice-actions">'
      +'<button class="btn-ghost" id="v-cancel">Annuler</button>'
      +'<button class="btn-save" id="v-apply" style="display:none">Appliquer</button>'
    +'</div>'
  +'</div>';
  document.body.appendChild(voiceModal);
  document.getElementById('v-cancel').onclick=stopVoice;
}
let voiceParsed=null;
function startVoice(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){toast('Commande vocale non supportée (utilisez Chrome)','err');return;}
  openVoiceModal();
  const fab=document.getElementById('voice-fab');
  if(fab)fab.classList.add('recording');
  voiceRec=new SR();
  voiceRec.lang='fr-FR';voiceRec.continuous=false;voiceRec.interimResults=true;
  voiceRec.onresult=e=>{
    const t=Array.from(e.results).map(r=>r[0].transcript).join('');
    const el=document.getElementById('v-transcript');
    if(el){el.textContent=t;el.style.color='';}
    if(e.results[e.results.length-1].isFinal)processVoice(t);
  };
  voiceRec.onerror=err=>{
    toast('Erreur micro : '+err.error,'err');stopVoice();
  };
  voiceRec.onend=()=>{if(fab)fab.classList.remove('recording');};
  voiceRec.start();
}
async function processVoice(transcript){
  const resEl=document.getElementById('v-result');
  if(resEl){resEl.style.display='block';resEl.textContent='Analyse en cours…';}
  const res=await api('POST','/agent',{
    type:'voice',transcript,
    contacts:state.contacts.map(c=>({id:c.id,nom:c.nom,entreprise:c.entreprise,statut:c.statut})),
    heure:new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}),
    jour:new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'}),
    kpi:computeKPI(),relances:{retard:[],aujourdhui:[]},
  });
  if(!res||!res.message){if(resEl)resEl.textContent='Incompris, réessayez.';return;}
  voiceParsed=res;
  if(resEl){resEl.textContent=res.message;}
  const applyBtn=document.getElementById('v-apply');
  if(applyBtn)applyBtn.style.display='';
  applyBtn.onclick=()=>applyVoice(res);
}
async function applyVoice(res){
  stopVoice();
  toast('Commande appliquée','win');
  scheduleAgent();
  render();
}
function stopVoice(){
  if(voiceRec)try{voiceRec.stop();}catch(e){}
  voiceRec=null;voiceParsed=null;
  if(voiceModal)voiceModal.remove();
  voiceModal=null;
  const fab=document.getElementById('voice-fab');
  if(fab)fab.classList.remove('recording');
}

function ringHTML(value,goal,label){
  const size=120,r=size/2-10,c=2*Math.PI*r,pct=goal>0?Math.min(value/goal,1):0,done=pct>=1;
  const off=c*(1-pct);
  return '<div class="ring"><svg viewBox="0 0 '+size+' '+size+'" width="100%" height="100%">'
    +'<circle cx="60" cy="60" r="'+r+'" fill="none" stroke="#1e1e1e" stroke-width="10"/>'
    +'<circle cx="60" cy="60" r="'+r+'" fill="none" stroke="'+(done?'#10b981':'#3b82f6')+'" stroke-width="10" stroke-linecap="round" stroke-dasharray="'+c+'" stroke-dashoffset="'+off+'" style="transition:stroke-dashoffset .6s"/>'
    +'</svg><div class="center"><div class="rnum'+(done?' done':'')+'">'+value+'</div><div class="rgoal">/ '+goal+' '+label+'</div></div></div>';
}
function barChartHTML(chart,obj){
  const W=540,H=170,pl=22,pr=8,pt=6,pb=20,iw=W-pl-pr,ih=H-pt-pb;
  const max=Math.max(obj||1,...chart.map(d=>d.appels),1);
  const bw=iw/chart.length;
  let bars='',labs='';
  const grid=[0,Math.round(max/2),max].map(v=>{
    const y=pt+ih-(v/max)*ih;
    return '<line x1="'+pl+'" y1="'+y+'" x2="'+(W-pr)+'" y2="'+y+'" stroke="#1e1e1e"/><text x="'+(pl-4)+'" y="'+(y+3)+'" text-anchor="end" font-size="10" fill="#475569">'+v+'</text>';
  }).join('');
  chart.forEach((d,i)=>{
    const h=(d.appels/max)*ih,x=pl+i*bw+bw*.18,y=pt+ih-h,w=bw*.64;
    const col=d.appels>=obj&&obj>0?'#10b981':'#3b82f6';
    bars+='<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+Math.max(h,0)+'" rx="3" fill="'+col+'"/>';
    if(i%2===1)labs+='<text x="'+(pl+i*bw+bw/2)+'" y="'+(H-4)+'" text-anchor="middle" font-size="9" fill="#475569">'+esc(d.jour)+'</text>';
  });
  return '<svg viewBox="0 0 '+W+' '+H+'" class="chart-wrap" style="height:170px;width:100%" preserveAspectRatio="none">'+grid+bars+labs+'</svg>';
}

async function loadMemories(){
  const res=await api('GET','/memory');
  if(res&&Array.isArray(res))state.memories=res;
}
async function deleteMemory(id){
  state.memories=state.memories.filter(m=>m.id!==id);
  const el=document.getElementById('mem-list');
  if(el)el.innerHTML=renderMemories();
  await api('DELETE','/memory?id='+id);
  toast('Souvenir effacé');
}
const CAT_LABEL={'objection':'Objection','prospect':'Prospect','preference':'Préférence','decision':'Décision','pattern':'Pattern','general':'Général','conversation':'Divers'};
function renderMemories(){
  if(!state.memories.length)return'<div style="color:var(--muted);font-size:13px;font-style:italic">Aucun souvenir pour l\'instant. Conversez avec le mentor pour qu\'il commence à mémoriser.</div>';
  const byCat={};
  state.memories.forEach(m=>{const cat=m.category||'general';if(!byCat[cat])byCat[cat]=[];byCat[cat].push(m);});
  return Object.entries(byCat).map(([cat,mems])=>'<div style="margin-bottom:10px"><div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:6px">'+(CAT_LABEL[cat]||cat)+'</div><div style="display:flex;flex-wrap:wrap;gap:6px">'+mems.map(m=>'<div class="memory-tag mem-cat-'+cat+'">'+esc(m.content)+'<button onclick="deleteMemory(\''+m.id+'\')" title="Supprimer">×</button></div>').join('')+'</div></div>').join('');
}
function fmtTime(iso){return new Date(iso).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});}


async function weeklyRecap(){
  const now=new Date();
  const weekStart=new Date(now);weekStart.setDate(now.getDate()-now.getDay()+1);weekStart.setHours(0,0,0,0);
  const k=computeKPI(),rel=computeRelances();
  const recapMsg='Fais-moi un bilan de ma semaine de prospection et donne-moi une stratégie concrète pour la semaine qui vient. Sois précis, motivant, et utilise ce que tu sais de moi.';
  state.chatMessages.push({role:'user',content:recapMsg,time:new Date().toISOString()});
  state.chatLoading=true;renderChat();
  const res=await api('POST','/chat',{
    messages:state.chatMessages.map(m=>({role:m.role,content:m.content})),
    kpi:{...k,objAppels:state.settings.objAppels},
    contacts:state.contacts,
    relances:{retard:rel.retard,aujourdhui:rel.aujourdhui},
    heure:now.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}),
    jour:now.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'}),
  });
  state.chatLoading=false;
  if(res&&res.reply)state.chatMessages.push({role:'assistant',content:res.reply,time:new Date().toISOString()});
  renderChat();
}

async function sendChatMessage(){
  const input=document.getElementById('chat-input');
  if(!input)return;
  const text=input.value.trim();
  if(!text||state.chatLoading)return;
  input.value='';
  const now=new Date().toISOString();
  state.chatMessages.push({role:'user',content:text,time:now});
  state.chatLoading=true;
  renderChat();
  const k=computeKPI(),rel=computeRelances();
  const res=await api('POST','/chat',{
    messages:state.chatMessages.map(m=>({role:m.role,content:m.content})),
    kpi:{...k,objAppels:state.settings.objAppels},
    contacts:state.contacts,
    relances:{retard:rel.retard,aujourdhui:rel.aujourdhui},
    heure:new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}),
    jour:new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'}),
  });
  state.chatLoading=false;
  if(res&&res.reply){
    state.chatMessages.push({role:'assistant',content:res.reply,time:new Date().toISOString()});
    setTimeout(loadMemories,3000); // recharger les mémoires après extraction
  }
  renderChat();
}

function renderChat(){
  const area=document.getElementById('chat-messages');
  if(!area)return;
  area.innerHTML=state.chatMessages.map(m=>'<div class="chat-msg '+m.role+'">'
    +'<div class="chat-bubble">'+esc(m.content)+'</div>'
    +'<div class="chat-time">'+fmtTime(m.time)+'</div>'
  +'</div>').join('')
  +(state.chatLoading?'<div class="chat-msg assistant"><div class="chat-typing"><span></span><span></span><span></span></div></div>':'');
  area.scrollTop=area.scrollHeight;
  const btn=document.getElementById('chat-send-btn');
  if(btn)btn.disabled=state.chatLoading;
}

let toastTimer=null;
function toast(msg,tone){
  let el=document.getElementById('_toast');
  if(!el){el=document.createElement('div');el.id='_toast';el.className='toast-el';document.body.appendChild(el);}
  el.className='toast-el '+(tone||'');
  el.innerHTML=(tone==='win'?ic('party',15):ic('check',15))+'<span>'+esc(String(msg))+'</span>';
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{if(el)el.remove();},2800);
}

const NAV=[
  {key:'dashboard',label:'Tableau de bord',icon:'dashboard'},
  {key:'contacts',label:'Contacts',icon:'users'},
  {key:'pipeline',label:'Pipeline',icon:'pipeline'},
  {key:'relances',label:'Relances',icon:'bell'},
  {key:'devis',label:'Devis',icon:'filetext'},
  {key:'mentor',label:'Mentor',icon:'zap'},
  {key:'activite',label:'Activité',icon:'activity'},
];
function render(){
  if(!state.loaded)return;
  const rel=computeRelances();
  const alertCount=rel.retard.length+rel.aujourdhui.length;
  const badges={contacts:state.contacts.length||null,relances:alertCount||null,devis:state.devis.length||null};
  const sidebar='<aside class="sidebar"><div class="brand">'
    +'<div class="brand-logo"><img src="/admin/logo.png" alt="Controlia"/></div>'
    +'<div><div class="brand-name">Controlia</div><div class="brand-sub">Admin</div></div></div>'
    +'<nav class="nav">'+NAV.map(n=>{const active=state.view===n.key,b=badges[n.key],alert=n.key==='relances'&&alertCount>0;
      return'<button class="nav-item'+(active?' active':'')+'" data-act="goto" data-view="'+n.key+'">'+ic(n.icon,17)+'<span class="lbl">'+n.label+'</span>'+(b!=null?'<span class="nav-badge'+(alert?' alert':'')+'">'+b+'</span>':'')+'</button>';}).join('')+'</nav>'
    +'<div class="sidebar-foot"><button class="btn-new" data-act="new">'+ic('plus',16)+' Nouveau contact</button><button class="btn-logout" data-act="logout">'+ic('logout',15)+' Déconnexion</button></div></aside>';
  const label=(NAV.find(n=>n.key===state.view)||{label:''}).label;
  const topbar='<div class="topbar"><h1>'+esc(label)+'</h1>'
    +'<button class="icon-btn" data-act="goto" data-view="relances">'+ic('bell',18)+(alertCount>0?'<span class="bell-badge">'+alertCount+'</span>':'')+'</button>'
    +(state.view==='devis'
      ?'<button class="btn-primary hide-sm" data-act="new-devis">'+ic('plus',16)+' Nouveau devis</button>'
      :'<button class="btn-primary hide-sm" data-act="new">'+ic('plus',16)+' Ajouter</button>'
    )+'</div>';
  let body='';
  try{
    if(state.view==='dashboard')body=viewDashboard();
    else if(state.view==='contacts')body=viewContacts();
    else if(state.view==='pipeline')body=viewPipeline();
    else if(state.view==='relances')body=viewRelances();
    else if(state.view==='devis')body=viewDevis();
    else if(state.view==='mentor')body=viewMentor();
    else if(state.view==='activite')body=viewActivite();
  }catch(err){
    body='<div style="color:#fb7185;padding:24px"><b>Erreur '+esc(state.view)+' :</b> '+esc(err.message)+'</div>';
    console.error('View error',state.view,err);
  }
  document.getElementById('app').innerHTML='<div class="app">'+sidebar+'<div class="main">'+topbar+'<main class="content">'+body+'</main></div></div>'
    +'<button class="voice-fab" id="voice-fab" title="Commande vocale">'+ic('mic',20)+'</button>'
    +modalHTML()+devisModalHTML();
  const bn=document.getElementById('botnav-fixed');
  if(bn)bn.innerHTML=NAV.map(n=>{const active=state.view===n.key,alert=n.key==='relances'&&alertCount>0;
    const fn="state.view='"+n.key+"';state.filter='Tous';render();";
    return'<button onclick="'+fn+'" class="'+(active?'active':'')+'" style="flex:1;min-width:0">'+ic(n.icon,18)+'<span>'+n.label.split(' ')[0]+'</span>'+(alert?'<span class="bdot"></span>':'')+'</button>';
  }).join('');
  document.getElementById('voice-fab').onclick=startVoice;
}

/* ════════════════════════════════════════════════════════════
   ÉVÉNEMENTS
════════════════════════════════════════════════════════════ */
document.addEventListener('click',e=>{
  const t=e.target.closest('[data-act]');if(!t)return;
  const act=t.getAttribute('data-act'),id=t.getAttribute('data-id');
  switch(act){
    case 'goto':state.view=t.getAttribute('data-view');state.filter='Tous';render();break;
    case 'new':state.editing={};state.confirmDel=false;render();break;
    case 'open':{const c=state.contacts.find(x=>x.id===id);if(c){state.editing={...c};state.confirmDel=false;render();}}break;
    case 'close':state.editing=null;state.confirmDel=false;render();break;
    case 'close-bg':if(!e.target.closest('[data-stop]')){state.editing=null;state.confirmDel=false;render();}break;
    case 'save-c':saveContactFromForm();break;
    case 'call':logCall(id,false);break;
    case 'call-modal':logCall(id,true);break;
    case 'win':moveStage(id,'Gagné',true);break;
    case 'lose':moveStage(id,'Perdu',true);break;
    case 'del-ask':state.confirmDel=true;render();break;
    case 'del-no':state.confirmDel=false;render();break;
    case 'del-yes':deleteContact(id);break;
    case 'closerel':closeRelance(id);break;
    case 'filter':state.filter=t.getAttribute('data-f');render();break;
    case 'logout':logout();break;
    case 'agent-refresh':fetchAgent();break;
    case 'new-devis':state.editingDevis={lignes:[],tva:0,statut:'Brouillon'};state.confirmDelDevis=false;render();break;
    case 'open-devis':{const dv=state.devis.find(x=>x.id===id);if(dv){state.editingDevis={...dv,lignes:[...(dv.lignes||[])]};state.confirmDelDevis=false;render();}}break;
    case 'preview-devis':{const dv=state.devis.find(x=>x.id===id);if(dv)previewDevis(dv);else toast('Devis introuvable','err');}break;
    case 'close-dv':state.editingDevis=null;state.confirmDelDevis=false;render();break;
    case 'close-dv-bg':if(!e.target.closest('[data-stop]')){state.editingDevis=null;state.confirmDelDevis=false;render();}break;
    case 'save-dv':saveDevisFromForm();break;
    case 'deldv-ask':state.confirmDelDevis=true;render();break;
    case 'add-line':{const tb=document.getElementById('lines-body');if(!tb)break;const i=tb.querySelectorAll('.dline').length;const tr=document.createElement('tr');tr.className='dline';tr.innerHTML='<td><input class="inp" data-field="desc" placeholder="Prestation…"/></td><td style="width:70px"><input class="inp" data-field="qty" type="number" min="0.5" step="0.5" value="1" style="text-align:center"/></td><td style="width:110px"><input class="inp" data-field="pu" type="number" min="0" step="10" value="0"/></td><td style="width:100px;text-align:right;font-weight:600;color:var(--emerald);padding:0 8px">0 €</td><td style="width:32px"><button class="mini-btn" data-act="del-line" data-li="'+i+'" style="color:var(--rose)">'+ic('x',13)+'</button></td>';tb.appendChild(tr);break;}
    case 'del-line':{const row=t.closest('.dline');if(row){row.remove();recomputeDevisLines();}}break;
  }
});
document.addEventListener('input',e=>{
  if(e.target.id==='search'){
    const q=e.target.value.toLowerCase();
    document.querySelectorAll('#contact-list .row').forEach(r=>{r.classList.toggle('hidden',q&&!(r.getAttribute('data-search')||'').includes(q));});
  }
  if(e.target.closest('.dline')||e.target.id==='d-tva')recomputeDevisLines();
});
document.addEventListener('change',e=>{
  const t=e.target.closest('[data-act="goal"]');
  if(t){state.settings[t.getAttribute('data-key')]=Math.max(0,Number(t.value)||0);localStorage.setItem('controlia_settings',JSON.stringify(state.settings));render();}
});
document.addEventListener('dragstart',e=>{const c=e.target.closest('.kcard');if(!c)return;state.drag=c.getAttribute('data-id');c.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
document.addEventListener('dragend',e=>{const c=e.target.closest('.kcard');if(c)c.classList.remove('dragging');document.querySelectorAll('.kcol.over').forEach(x=>x.classList.remove('over'));state.drag=null;});
document.addEventListener('dragover',e=>{const col=e.target.closest('.kcol');if(!col||!state.drag)return;e.preventDefault();document.querySelectorAll('.kcol.over').forEach(x=>{if(x!==col)x.classList.remove('over');});col.classList.add('over');});
document.addEventListener('drop',e=>{const col=e.target.closest('.kcol');if(!col||!state.drag)return;e.preventDefault();const st=col.getAttribute('data-col');const c=state.contacts.find(x=>x.id===state.drag);if(c&&c.statut!==st)moveStage(state.drag,st,false);state.drag=null;});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    if(state.editingDevis){state.editingDevis=null;state.confirmDelDevis=false;render();}
    else if(state.editing){state.editing=null;state.confirmDel=false;render();}
  }
});

/* ════════════════════════════════════════════════════════════
   INIT
════════════════════════════════════════════════════════════ */
(async function init(){
  const token=localStorage.getItem('controlia_token');
  if(!token){window.location='/admin/login.html';return;}
  try{
    const[c,d]=await Promise.all([api('GET','/contacts'),api('GET','/devis')]);
    if(!c)return;
    state.contacts=(Array.isArray(c)?c:[]).map(fromDB);
    state.devis=(Array.isArray(d)?d:[]).map(fromDBDevis);
    const saved=localStorage.getItem('controlia_settings');
    if(saved)try{state.settings=JSON.parse(saved);}catch(e){}
    state.loaded=true;
    render();
    fetchAgent();
    loadMemories();
  }catch(err){
    console.error('Init error:',err);
    document.getElementById('app').innerHTML='<div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:24px;font-family:monospace">'
      +'<div style="color:#fb7185;font-weight:700">Erreur : '+esc(err.message)+'</div>'
      +'<pre style="color:#64748b;font-size:11px;background:#111;padding:12px;border-radius:8px;max-width:600px;overflow:auto">'+esc(err.stack||'')+'</pre>'
      +'<a href="/admin/login.html" style="color:#3b82f6;font-weight:600">Reconnexion →</a>'
      +'</div>';
  }
})();
</script>
</body>
</html>
