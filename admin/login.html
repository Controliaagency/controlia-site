<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Controlia — Connexion</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Inter',ui-sans-serif,system-ui,sans-serif;
    background:#0b1622;color:#e2e8f0;min-height:100vh;
    display:flex;align-items:center;justify-content:center;
    -webkit-font-smoothing:antialiased;
  }
  .card{
    width:100%;max-width:400px;padding:40px 36px;
    background:#122032;border:1px solid rgba(255,255,255,.08);border-radius:16px;
    box-shadow:0 24px 64px rgba(0,0,0,.5);
  }
  .logo{display:flex;align-items:center;gap:12px;margin-bottom:32px}
  .logo-mark{
    width:42px;height:42px;border-radius:12px;background:#3b82f6;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 8px 20px rgba(59,130,246,.35);
  }
  .logo-mark svg{display:block}
  .logo-name{font-size:20px;font-weight:700;color:#fff}
  .logo-sub{font-size:12px;color:#475569;margin-top:1px}
  h1{font-size:22px;font-weight:700;color:#f8fafc;margin-bottom:6px}
  p{font-size:14px;color:#64748b;margin-bottom:28px}
  label{display:block;margin-bottom:16px}
  .lbl{font-size:12px;font-weight:500;color:#94a3b8;margin-bottom:6px;display:block}
  input{
    width:100%;padding:11px 14px;background:#1a2d42;border:1px solid rgba(255,255,255,.1);
    border-radius:9px;color:#f8fafc;font-size:15px;font-family:inherit;
    transition:.15s;
  }
  input:focus{outline:none;border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.2)}
  .btn{
    width:100%;padding:12px;background:#3b82f6;color:#fff;font-weight:600;
    font-size:15px;border-radius:9px;border:none;cursor:pointer;
    font-family:inherit;transition:.15s;margin-top:8px;
  }
  .btn:hover{background:#2563eb}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .err{
    background:#2d1418;border:1px solid #7f1d1d;color:#fca5a5;
    border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:16px;
    display:none;
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-mark">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/>
      </svg>
    </div>
    <div>
      <div class="logo-name">Controlia</div>
      <div class="logo-sub">Espace admin</div>
    </div>
  </div>

  <h1>Connexion</h1>
  <p>Accès réservé à l'équipe Controlia.</p>

  <div class="err" id="err"></div>

  <form id="form" autocomplete="on">
    <label>
      <span class="lbl">Identifiant</span>
      <input id="login" type="text" autocomplete="username" placeholder="Identifiant" required/>
    </label>
    <label>
      <span class="lbl">Mot de passe</span>
      <input id="password" type="password" autocomplete="current-password" placeholder="••••••••••••" required/>
    </label>
    <button class="btn" id="btn" type="submit">Se connecter</button>
  </form>
</div>

<script>
  // Already logged in?
  if (localStorage.getItem('controlia_token')) {
    window.location = '/admin/';
  }

  document.getElementById('form').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = document.getElementById('btn');
    const err = document.getElementById('err');
    btn.disabled = true;
    btn.textContent = 'Connexion…';
    err.style.display = 'none';

    try {
      const res = await fetch('/.netlify/functions/auth', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          login:    document.getElementById('login').value.trim(),
          password: document.getElementById('password').value,
        }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Erreur');
      localStorage.setItem('controlia_token', data.token);
      window.location = '/admin/';
    } catch (e) {
      err.textContent = e.message;
      err.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Se connecter';
    }
  });
</script>
</body>
</html>
